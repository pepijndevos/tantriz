  <title
     id="title1">Tantrix-style hex tile with two 60-degree curves and a straight crossing both</title>
  <desc
     id="desc1">Pointy-top hexagonal model railway tile with three tracks. Two 60-degree curves run roughly parallel to the left and right vertical faces, bulging inward toward the tile centre. A horizontal straight runs from the left face to the right face and crosses both curves at diamond crossings. Sleepers and rails are drawn in railway style.</desc>
